<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="laozig · NodeGet 服务器状态监控面板" />
    <meta name="theme-color" content="#0a0e1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="laozig" />
    <link rel="icon" type="image/png" href="./logo.png" />
    <link rel="apple-touch-icon" href="./logo.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Orbitron:wght@500;700&family=Share+Tech+Mono&family=Special+Elite&family=VT323&display=swap"
      rel="stylesheet"
    />
    <title>laozig</title>
    <script>
      // 防闪烁:首屏前应用用户已选的 明暗/强调色/预设主题(localStorage 覆盖项)
      (function () {
        try {
          var root = document.documentElement
          var mode = localStorage.getItem('nodeget.theme') || 'dark'
          var dark = mode === 'dark' ||
            (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          root.classList.add(dark ? 'dark' : 'light')
          var accent = localStorage.getItem('nodeget.accent')
          if (accent) root.setAttribute('data-accent', accent)
          var preset = localStorage.getItem('nodeget.preset')
          if (preset && preset !== 'nebula') root.setAttribute('data-theme', preset)
        } catch (_) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
    <link rel="stylesheet" href="./custom.css" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="./custom.js" defer></script>
  </body>
</html>
