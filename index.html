    <meta name="twitter:card" content="summary" />

      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cinzel+Decorative:wght@700;900&family=Liu+Jian+Mao+Cao&family=Long+Cang&family=Ma+Shan+Zheng&family=MedievalSharp&family=Orbitron:wght@500;700&family=Pirata+One&family=Press+Start+2P&family=Share+Tech+Mono&family=Special+Elite&family=VT323&family=ZCOOL+XiaoWei&display=swap"
      rel="stylesheet"
    />
    <title>laozig</title>
    <script>
      // 防闪烁:首屏前应用用户已选的 明暗/强调色/预设主题(localStorage 覆盖项)
      (function () {
        try {
          var root = document.documentElement
          var mode = localStorage.getItem('nodeget.theme') || 'dark'
          var dark = mode === 'dark' ||
            (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          root.classList.add(dark ? 'dark' : 'light')
          var accent = localStorage.getItem('nodeget.accent') || 'violet'
          root.setAttribute('data-accent', accent)
          var preset = localStorage.getItem('nodeget.preset') || 'future'
          if (preset !== 'nebula') root.setAttribute('data-theme', preset)
        } catch (_) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
    <link rel="stylesheet" href="./custom.css" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="./custom.js" defer></script>
  </body>
</html>
